spring.application.name=GetItDoneSB

# Set dev profile as default (uses H2 in-memory database)
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/getitdone
spring.datasource.username=postgres
spring.datasource.password=teja
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# JWT
jwt.secret=change-me-please-replace-in-prod

# Reminder window (hours)
reminder.window.start.hours=3
reminder.window.end.hours=4
reminder.check.ms=1800000

# Feature flags
features.reminders.enabled=false
spring.task.scheduling.enabled=false
